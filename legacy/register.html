<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — SCF Nortrans</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="auth-container">
  <div class="auth-card" style="max-width:520px">
    <div class="text-center mb-4">
      <div class="auth-logo"><i class="bi bi-person-plus-fill"></i></div>
      <h1 class="auth-title mt-2">Crear cuenta</h1>
      <p class="auth-subtitle">Ingresa tus datos para registrarte</p>
    </div>

    <div id="alerta-register"></div>

    <form id="form-register" novalidate>
      <div class="row g-3">
        <div class="col-12">
          <label for="nombre" class="form-label">Nombre completo</label>
          <input type="text" class="form-control" id="nombre" placeholder="Ej: Pedro Ramírez">
          <div class="invalid-feedback" id="nombre-feedback"></div>
        </div>

        <div class="col-md-6">
          <label for="rut" class="form-label">RUT</label>
          <input type="text" class="form-control" id="rut" placeholder="12.345.678-9">
          <div class="invalid-feedback" id="rut-feedback"></div>
        </div>

        <div class="col-md-6">
          <label for="telefono" class="form-label">Teléfono</label>
          <input type="text" class="form-control" id="telefono" placeholder="+56 9 1234 5678">
          <div class="invalid-feedback" id="telefono-feedback"></div>
        </div>

        <div class="col-12">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" placeholder="correo@nortrans.cl">
          <div class="invalid-feedback" id="email-feedback"></div>
        </div>

        <div class="col-12">
          <label for="password" class="form-label">Contraseña</label>
          <div class="input-group">
            <input type="password" class="form-control" id="password" placeholder="••••••••">
            <button class="btn btn-outline-secondary" type="button" id="togglePwd">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
          <div class="invalid-feedback" id="password-feedback"></div>
          <div class="mt-2">
            <div class="progress strength-bar">
              <div class="progress-bar bg-secondary" id="strength-bar" role="progressbar" style="width:0%"></div>
            </div>
            <small class="text-muted" id="strength-text"></small>
          </div>
          <ul class="mt-2 ps-3 small text-muted" id="pwd-rules">
            <li id="rule-min">Mínimo 8 caracteres</li>
            <li id="rule-max">Máximo 20 caracteres</li>
            <li id="rule-num">Al menos un número</li>
            <li id="rule-special">Al menos un carácter especial (!@#$%...)</li>
          </ul>
        </div>

        <div class="col-12">
          <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
          <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••">
          <div class="invalid-feedback" id="confirmPassword-feedback"></div>
        </div>
      </div>

      <div class="d-grid mt-4">
        <button type="submit" class="btn btn-warning btn-lg">
          <i class="bi bi-person-check me-2"></i>Registrarme
        </button>
      </div>
    </form>

    <hr class="border-secondary my-3">
    <p class="text-center small text-muted mb-0">
      ¿Ya tienes cuenta? <a href="login.html" class="text-warning text-decoration-none">Inicia sesión</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/validaciones.js"></script>
<script>
  initData();

  document.getElementById('togglePwd').addEventListener('click', () => {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
    icon.className = pwd.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
  });

  document.getElementById('password').addEventListener('input', function() {
    const v = this.value;
    actualizarFuerzaPassword(v, 'strength-bar', 'strength-text');

    const set = (id, ok) => {
      const el = document.getElementById(id);
      el.style.color = ok ? '#22c55e' : '';
    };
    set('rule-min', v.length >= 8);
    set('rule-max', v.length <= 20 && v.length > 0);
    set('rule-num', /[0-9]/.test(v));
    set('rule-special', /[!@#$%^&*()_+\-=\[\]{}|;:,.<>?]/.test(v));
  });

  document.getElementById('form-register').addEventListener('submit', function(e) {
    e.preventDefault();
    const nombre = document.getElementById('nombre').value.trim();
    const rut = document.getElementById('rut').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    let valido = true;
    valido = mostrarError('nombre', Validar.requerido(nombre, 'Nombre')) && valido;
    valido = mostrarError('rut', Validar.rut(rut)) && valido;
    valido = mostrarError('telefono', Validar.telefono(telefono)) && valido;
    valido = mostrarError('email', Validar.email(email)) && valido;
    valido = mostrarError('password', Validar.password(password)) && valido;

    const errConfirm = password !== confirm ? ['Las contraseñas no coinciden'] : [];
    valido = mostrarError('confirmPassword', errConfirm) && valido;

    if (!valido) return;

    const usuarios = getUsuarios();
    if (usuarios.find(u => u.email === email)) {
      mostrarAlerta('alerta-register', 'Este correo ya está registrado.', 'danger');
      return;
    }

    saveUsuario({ nombre, rut, telefono, email, password, rol: 'conductor', activo: true });
    mostrarAlerta('alerta-register', '¡Cuenta creada exitosamente! Redirigiendo...', 'success');
    setTimeout(() => window.location.href = 'login.html', 1800);
  });
</script>
</body>
</html>
