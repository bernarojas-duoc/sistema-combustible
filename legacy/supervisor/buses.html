<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Buses — SCF Nortrans</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>

<div class="container content-area py-4">
  <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div>
      <h2 class="mb-0"><i class="bi bi-bus-front me-2"></i>Gestión de Buses</h2>
      <small class="text-muted">Administra la flota de vehículos</small>
    </div>
    <button class="btn btn-warning" onclick="abrirModal()">
      <i class="bi bi-plus-circle me-2"></i>Agregar bus
    </button>
  </div>

  <div id="alerta-buses"></div>

  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-dark table-hover mb-0">
          <thead>
            <tr>
              <th>Patente</th>
              <th>Modelo</th>
              <th>Cap. Tanque</th>
              <th>Km/L esperado</th>
              <th>Total cargas</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-buses"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal agregar/editar bus -->
<div class="modal fade" id="modalBus" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="modal-titulo">Agregar bus</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="alerta-modal"></div>
        <form id="form-bus" novalidate>
          <input type="hidden" id="bus-id">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="patente" class="form-label">Patente</label>
              <input type="text" class="form-control" id="patente" placeholder="BJKP-12">
              <div class="invalid-feedback" id="patente-feedback"></div>
            </div>
            <div class="col-md-6">
              <label for="modelo" class="form-label">Modelo</label>
              <input type="text" class="form-control" id="modelo" placeholder="Mercedes-Benz O500">
              <div class="invalid-feedback" id="modelo-feedback"></div>
            </div>
            <div class="col-md-6">
              <label for="capacidadTanque" class="form-label">Capacidad tanque (L)</label>
              <input type="number" class="form-control" id="capacidadTanque" placeholder="300" min="50" max="1000">
              <div class="invalid-feedback" id="capacidadTanque-feedback"></div>
            </div>
            <div class="col-md-6">
              <label for="kmLitroEsperado" class="form-label">Km/L esperado</label>
              <input type="number" class="form-control" id="kmLitroEsperado" placeholder="3.5" min="0.5" max="20" step="0.1">
              <div class="invalid-feedback" id="kmLitroEsperado-feedback"></div>
            </div>
            <div class="col-12">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="activo" checked>
                <label class="form-check-label" for="activo">Bus activo en la flota</label>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-warning" onclick="guardarBus()">
          <i class="bi bi-save me-1"></i>Guardar
        </button>
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/validaciones.js"></script>
<script src="../js/utils.js"></script>
<script>
  initData();
  requireAuth('supervisor');
  renderNavbar();
  marcarNavActivo();

  let modal;

  function renderTabla() {
    const buses = getBuses();
    const cargas = getCargas();
    const tbody = document.getElementById('tabla-buses');
    tbody.innerHTML = '';
    buses.forEach(b => {
      const totalCargas = cargas.filter(c => c.busId === b.id).length;
      tbody.innerHTML += `
        <tr>
          <td><strong class="text-warning">${b.patente}</strong></td>
          <td>${b.modelo}</td>
          <td>${b.capacidadTanque} L</td>
          <td>${b.kmLitroEsperado} km/L</td>
          <td><span class="badge bg-secondary">${totalCargas}</span></td>
          <td>${b.activo
            ? '<span class="badge bg-success">Activo</span>'
            : '<span class="badge bg-dark">Inactivo</span>'}</td>
          <td class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-warning py-0 px-2" onclick="abrirModal(${b.id})">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="eliminarBus(${b.id})">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>`;
    });
  }

  function abrirModal(id = null) {
    document.getElementById('form-bus').reset();
    document.getElementById('alerta-modal').innerHTML = '';
    limpiarValidaciones('form-bus');

    if (id) {
      const b = getBusById(id);
      document.getElementById('modal-titulo').textContent = 'Editar bus';
      document.getElementById('bus-id').value = b.id;
      document.getElementById('patente').value = b.patente;
      document.getElementById('modelo').value = b.modelo;
      document.getElementById('capacidadTanque').value = b.capacidadTanque;
      document.getElementById('kmLitroEsperado').value = b.kmLitroEsperado;
      document.getElementById('activo').checked = b.activo;
    } else {
      document.getElementById('modal-titulo').textContent = 'Agregar bus';
      document.getElementById('bus-id').value = '';
      document.getElementById('activo').checked = true;
    }

    modal = new bootstrap.Modal(document.getElementById('modalBus'));
    modal.show();
  }

  function guardarBus() {
    const patente = document.getElementById('patente').value.trim();
    const modelo = document.getElementById('modelo').value.trim();
    const capacidad = document.getElementById('capacidadTanque').value;
    const kml = document.getElementById('kmLitroEsperado').value;
    const activo = document.getElementById('activo').checked;
    const id = document.getElementById('bus-id').value;

    let valido = true;
    valido = mostrarError('patente', Validar.requerido(patente, 'Patente')) && valido;
    valido = mostrarError('modelo', Validar.requerido(modelo, 'Modelo')) && valido;
    valido = mostrarError('capacidadTanque', Validar.numero(capacidad, 'Capacidad', 50, 1000)) && valido;
    valido = mostrarError('kmLitroEsperado', Validar.numero(kml, 'Km/L esperado', 0.5, 20)) && valido;
    if (!valido) return;

    const buses = getBuses();
    const duplicado = buses.find(b => b.patente.toLowerCase() === patente.toLowerCase() && b.id !== parseInt(id));
    if (duplicado) { mostrarAlerta('alerta-modal', 'Ya existe un bus con esa patente.', 'danger'); return; }

    saveBus({
      id: id ? parseInt(id) : undefined,
      patente: patente.toUpperCase(),
      modelo,
      capacidadTanque: parseFloat(capacidad),
      kmLitroEsperado: parseFloat(kml),
      activo
    });

    modal.hide();
    mostrarAlerta('alerta-buses', `Bus <strong>${patente.toUpperCase()}</strong> guardado correctamente.`, 'success');
    renderTabla();
  }

  function eliminarBus(id) {
    const b = getBusById(id);
    const cargas = getCargas().filter(c => c.busId === id);
    if (cargas.length > 0) {
      mostrarAlerta('alerta-buses', `No se puede eliminar: el bus <strong>${b.patente}</strong> tiene ${cargas.length} carga(s) registrada(s).`, 'warning');
      return;
    }
    confirmar(`¿Eliminar el bus ${b.patente}? Esta acción no se puede deshacer.`, () => {
      deleteBus(id);
      mostrarAlerta('alerta-buses', `Bus <strong>${b.patente}</strong> eliminado.`, 'success');
      renderTabla();
    });
  }

  renderTabla();
</script>
</body>
</html>
