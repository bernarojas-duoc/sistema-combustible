<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — SCF Nortrans</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-logo"><i class="bi bi-fuel-pump-fill"></i></div>
      <h1 class="auth-title mt-2">SCF Nortrans</h1>
      <p class="auth-subtitle">Sistema de Carga de Combustible</p>
    </div>

    <div id="alerta-login"></div>

    <form id="form-login" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label">Correo electrónico</label>
        <div class="input-group">
          <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="email" placeholder="usuario@nortrans.cl" required>
        </div>
        <div class="invalid-feedback" id="email-feedback"></div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
          <button class="btn btn-outline-secondary" type="button" id="togglePwd">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
        <div class="invalid-feedback" id="password-feedback"></div>
      </div>

      <div class="d-grid mt-4">
        <button type="submit" class="btn btn-warning btn-lg">
          <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
        </button>
      </div>
    </form>

    <hr class="border-secondary my-3">
    <div class="text-center">
      <a href="recover.html" class="text-warning text-decoration-none small">¿Olvidaste tu contraseña?</a>
      <span class="text-muted mx-2">|</span>
      <a href="register.html" class="text-warning text-decoration-none small">Crear cuenta</a>
    </div>

    <div class="mt-4 p-3 rounded bg-dark border border-secondary">
      <p class="text-muted small mb-1"><i class="bi bi-info-circle me-1"></i> Cuentas de prueba:</p>
      <p class="small mb-0 text-light">Supervisor: <code>supervisor@nortrans.cl</code> / <code>Admin@1234</code></p>
      <p class="small mb-0 text-light">Conductor: <code>pedro@nortrans.cl</code> / <code>Pedro@1234</code></p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/validaciones.js"></script>
<script>
  initData();

  // Redirige si ya hay sesión activa
  const sesionActiva = getSession();
  if (sesionActiva) {
    window.location.href = sesionActiva.rol === 'supervisor' ? 'supervisor/dashboard.html' : 'conductor/dashboard.html';
  }

  // Toggle mostrar/ocultar contraseña
  document.getElementById('togglePwd').addEventListener('click', () => {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      pwd.type = 'password';
      icon.className = 'bi bi-eye';
    }
  });

  document.getElementById('form-login').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    let valido = true;
    valido = mostrarError('email', Validar.email(email)) && valido;
    valido = mostrarError('password', Validar.requerido(password, 'Contraseña')) && valido;

    if (!valido) return;

    const usuario = login(email, password);
    if (!usuario) {
      mostrarAlerta('alerta-login', 'Correo o contraseña incorrectos.', 'danger');
      return;
    }
    window.location.href = usuario.rol === 'supervisor' ? 'supervisor/dashboard.html' : 'conductor/dashboard.html';
  });
</script>
</body>
</html>
