<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCF Nortrans</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="auth-container">
  <div class="text-center">
    <div class="text-warning fs-1 mb-3"><i class="bi bi-fuel-pump-fill"></i></div>
    <div class="spinner-border text-warning" role="status"></div>
    <p class="text-muted mt-3 small">Cargando sistema...</p>
  </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>
  initData();
  const session = getSession();
  if (session) {
    window.location.href = session.rol === 'supervisor' ? 'supervisor/dashboard.html' : 'conductor/dashboard.html';
  } else {
    window.location.href = 'login.html';
  }
</script>
</body>
</html>
