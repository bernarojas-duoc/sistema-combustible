<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Historial — SCF Nortrans</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>

<div class="container content-area py-4">
  <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div>
      <h2 class="mb-0"><i class="bi bi-clock-history me-2"></i>Mi Historial</h2>
      <small class="text-muted">Todas tus cargas de combustible</small>
    </div>
    <a href="nueva-carga.html" class="btn btn-warning">
      <i class="bi bi-plus-circle me-2"></i>Nueva carga
    </a>
  </div>

  <!-- Filtros -->
  <div class="card mb-3">
    <div class="card-body py-2">
      <div class="row g-2 align-items-end">
        <div class="col-sm-4 col-md-3">
          <label class="form-label small">Desde</label>
          <input type="date" class="form-control form-control-sm" id="filtro-desde">
        </div>
        <div class="col-sm-4 col-md-3">
          <label class="form-label small">Hasta</label>
          <input type="date" class="form-control form-control-sm" id="filtro-hasta">
        </div>
        <div class="col-sm-4 col-md-3">
          <label class="form-label small">Estado</label>
          <select class="form-select form-select-sm" id="filtro-estado">
            <option value="">Todos</option>
            <option value="pendiente">Pendiente</option>
            <option value="aprobado">Aprobado</option>
            <option value="alerta">Alerta</option>
            <option value="rechazado">Rechazado</option>
          </select>
        </div>
        <div class="col-md-3 d-flex gap-2">
          <button class="btn btn-warning btn-sm flex-grow-1" onclick="aplicarFiltros()">
            <i class="bi bi-funnel me-1"></i>Filtrar
          </button>
          <button class="btn btn-outline-secondary btn-sm" onclick="limpiarFiltros()">
            <i class="bi bi-x"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-dark table-hover mb-0">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Bus</th>
              <th>Litros</th>
              <th>Odómetro</th>
              <th>Km/L</th>
              <th>Grifo</th>
              <th>Estado</th>
              <th>Obs.</th>
            </tr>
          </thead>
          <tbody id="tabla-historial"></tbody>
        </table>
      </div>
      <div id="sin-resultados" class="text-center text-muted py-5 d-none">
        <i class="bi bi-inbox fs-2 d-block mb-2"></i>No se encontraron cargas con esos filtros.
      </div>
    </div>
    <div class="card-footer d-flex justify-content-between align-items-center text-muted small">
      <span id="resumen-tabla">— registros</span>
      <span id="resumen-litros"></span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
  initData();
  const session = requireAuth('conductor');
  renderNavbar();
  marcarNavActivo();

  let misCargas = getCargas()
    .filter(c => c.conductorId === session.id)
    .sort((a, b) => b.fecha.localeCompare(a.fecha));

  function renderTabla(cargas) {
    const tbody = document.getElementById('tabla-historial');
    const sinRes = document.getElementById('sin-resultados');
    tbody.innerHTML = '';

    if (cargas.length === 0) {
      sinRes.classList.remove('d-none');
      document.getElementById('resumen-tabla').textContent = '0 registros';
      document.getElementById('resumen-litros').textContent = '';
      return;
    }
    sinRes.classList.add('d-none');

    const totalLitros = cargas.reduce((s, c) => s + c.litros, 0);
    document.getElementById('resumen-tabla').textContent = `${cargas.length} registro${cargas.length !== 1 ? 's' : ''}`;
    document.getElementById('resumen-litros').textContent = `Total: ${formatearNumero(totalLitros)} litros`;

    cargas.forEach(c => {
      const km = calcularConsumo(c);
      const kmlHtml = km
        ? `<span class="${esAlerta(c) ? 'text-danger' : 'text-success'}">${km}</span>`
        : '-';
      const obs = c.observaciones
        ? `<span class="text-muted" title="${c.observaciones}"><i class="bi bi-chat-text"></i></span>`
        : '-';
      tbody.innerHTML += `
        <tr>
          <td>${formatearFecha(c.fecha)}</td>
          <td><span class="badge bg-secondary">${nombreBus(c.busId).split('—')[0].trim()}</span></td>
          <td><strong>${c.litros} L</strong></td>
          <td>${formatearNumero(c.odometro)} km</td>
          <td>${kmlHtml}</td>
          <td><small>${c.grifo}</small></td>
          <td>${estadoBadge(c.estado, c.motivoRechazo)}</td>
          <td class="text-center">${obs}</td>
        </tr>`;
    });
    initPopovers();
  }

  function aplicarFiltros() {
    const desde = document.getElementById('filtro-desde').value;
    const hasta = document.getElementById('filtro-hasta').value;
    const estado = document.getElementById('filtro-estado').value;

    let filtradas = misCargas;
    if (desde) filtradas = filtradas.filter(c => c.fecha >= desde);
    if (hasta) filtradas = filtradas.filter(c => c.fecha <= hasta);
    if (estado) filtradas = filtradas.filter(c => c.estado === estado);
    renderTabla(filtradas);
  }

  function limpiarFiltros() {
    document.getElementById('filtro-desde').value = '';
    document.getElementById('filtro-hasta').value = '';
    document.getElementById('filtro-estado').value = '';
    renderTabla(misCargas);
  }

  renderTabla(misCargas);
</script>
</body>
</html>
